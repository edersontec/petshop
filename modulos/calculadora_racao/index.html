<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Wanderley Lopes Batista">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../css/estilo_petshop.css">
    <script src="../../js/petshop.js"></script>
    <title>Calculadora de Ração</title>
</head>

<body>

    <h2>CALCULADORA DE RAÇÃO</h2>

    <ul class="menu">
        <li><a href="../../conteudo.html" target="principal">PÁGINA INICIAL</a></li>
    </ul>

    <fieldset>
        <legend><strong>INFORMAÇÕES DO CACHORRO</strong></legend>

        <form onsubmit="calcularRacao(); return false;">

            <label><strong>Nome do Cachorro:</strong></label><br>
            <input type="text" id="nome_cachorro" style="width: 98%; padding: 10px;" required><br><br>

            <label><strong>Porte:</strong></label><br>
            <select id="porte_cachorro" required>
                <option value="">Selecione o porte...</option>
                <option value="Miniatura (até 5kg)">Miniatura (até 5kg) - ex: Pinscher, Chihuahua</option>
                <option value="Pequeno (5kg a 10kg)">Pequeno (5kg a 10kg) - ex: Shih Tzu, Poodle Toy</option>
                <option value="Médio (11kg a 25kg)">Médio (11kg a 25kg) - ex: Beagle, Bulldog Francês</option>
                <option value="Grande (26kg a 44kg)">Grande (26kg a 44kg) - ex: Golden Retriever, Pastor Alemão</option>
                <option value="Gigante (45kg ou mais)">Gigante (45kg ou mais) - ex: Dogue Alemão, São Bernardo</option>
            </select><br><br>

            <label><strong>Idade / Fase da Vida:</strong></label><br>
            <input type="radio" name="idade_cachorro" value="Filhote" required> Filhote (Até 1 ano)
            <input type="radio" name="idade_cachorro" value="Adulto"> Adulto (1 a 7 anos)
            <input type="radio" name="idade_cachorro" value="Sênior"> Sênior (Acima de 7 anos)<br><br>

            <input type="submit" value="CALCULAR RECOMENDAÇÃO" style="padding: 10px 20px; cursor: pointer;">
        </form>
    </fieldset>

    <div id="resultado" style="margin-top: 20px; min-height: 50px;"></div>

    <footer id="rodape">
        <p>© 2026 - Portal Pet Shop | Desenvolvido para fins educacionais</p>
    </footer>

</body>

</html>
